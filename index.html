<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <title>Jugoos POS - Login</title>
    <link rel="stylesheet" href="styles/main.css" />
  </head>
  <body>
    <div class="login-container">
      <img src="assets/logo.png" alt="Jugoos Logo" class="logo" />

      <h2>Jugoos</h2>

      <div class="input-group">
        <label for="usuario">Usuario</label>
        <input
          type="text"
          id="usuario"
          placeholder="Ingrese su usuario"
          autocomplete="off"
        />
      </div>

      <div class="input-group">
        <label for="password">Contraseña</label>
        <input
          type="password"
          id="password"
          placeholder="Ingrese su contraseña"
        />
      </div>

      <button class="login-btn">Iniciar sesión</button>

      <div class="footer-text">© Jugoos · Pasión por lo natural</div>
    </div>

    <!-- Renderer -->
    <script src="renderer/login.js"></script>
    <script>
      window.addEventListener("DOMContentLoaded", () => {
        const usuario = document.getElementById("usuario");
        const password = document.getElementById("password");

        // Resetear inputs
        if (usuario) {
          usuario.value = "";
          usuario.disabled = false;
        }

        if (password) {
          password.value = "";
          password.disabled = false;
        }

        // Asegurar que la ventana tiene foco y los inputs son interactuables
        setTimeout(() => {
          window.focus();
          usuario?.focus();
        }, 150);
      });
    </script>
  </body>
</html>
